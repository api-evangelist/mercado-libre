description: >-
  FOCUS-aligned FinOps profile for Mercado Libre. The marketplace REST APIs are free to use; cost is incurred via marketplace listing/sale fees, Mercado Pago transaction fees, shipping costs (Mercado Envios), and advertising spend (Mercado Ads).
notes: Cost lever is at the commerce layer (fees and ads), not the API layer. Negotiate seller terms by country and category.
sources:
- https://www.mercadolibre.com/
- https://developers.mercadolibre.com/
- https://focus.finops.org/focus-specification/v1-3/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Mercado Libre
serviceCategory: E-Commerce
billingModel:
  pricingCategory: Transaction Fee
  billingFrequency: Per-Transaction
  billingCurrency: Local (ARS, BRL, MXN, CLP, COP, USD)
  chargeCategories:
  - Usage
  - Adjustment
focusColumns:
  ServiceName: Mercado Libre Marketplace
  ServiceCategory: E-Commerce
  ProviderName: Mercado Libre
  PublisherName: Mercado Libre
  InvoiceIssuerName: Mercado Libre (country entity)
  BillingCurrency: Local Currency
  ChargeCategory: Usage
meters:
- name: marketplace_sale_fee
  description: Commission charged on completed marketplace sales.
  unit: percent_of_sale
  aggregation: sum
  dimensions:
  - country
  - category
  - listing_type
- name: payment_processing_fee
  description: Mercado Pago processing fee per payment.
  unit: percent_plus_fixed
  aggregation: sum
  dimensions:
  - country
  - payment_method
- name: shipping_fee
  description: Mercado Envios shipping label cost.
  unit: per_shipment
  aggregation: sum
  dimensions:
  - country
  - service_level
- name: ads_spend
  description: Mercado Ads (Product Ads, Brand Ads) spend.
  unit: currency
  aggregation: sum
  dimensions:
  - country
  - campaign
principles:
- name: Visibility
  description: Pull seller billing reports by country entity; reconcile with Mercado Pago dashboards and Ads invoicing.
- name: Allocation
  description: Tag listings by SKU and brand to attribute fees to product lines.
- name: Optimization
  description: Tune listing type (free vs. classic vs. premium), shipping mode, and ad bidding to reduce blended take rate.
- name: Accountability
  description: Assign country-level commerce owners to track fee structures and renegotiate at scale.
maintainers:
